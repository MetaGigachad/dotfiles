shadow = false;
shadow-radius = 20;
shadow-exclude = [
    "_GTK_FRAME_EXTENTS@:c",
    "class_g * = 'dwm'",
    "class_g * = 'Rofi'",
]

fading = true;
no-fading-openclose = true;
fade-in-step = 0.04;
fade-out-step = 0.015;
fade-exclude = [
    "_GTK_FRAME_EXTENTS@:c",
]

inactive-opacity = 0.9;
blur-method = "dual_kawase";
blur-strength = 5;
backend = "glx";
vsync = true;
blur-background-exclude = [
    "window_type = 'dock'",
    "window_type = 'desktop'",
    "class_g * = 'dwm'",
];
opacity-rule = [
    "100:class_g * = 'dwm'",
#    "100:class_g * = 'Rofi'",
]

detect-client-leader = true;

corner-radius = 10;
rounded-corners-exclude = [
#    "class_g * = 'dwm'",
]
